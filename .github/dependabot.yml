version: 2
updates:
  # npm disabled: @gatecontrol/client-core uses file: reference which
  # Dependabot cannot resolve in its sandbox. Core library deps are
  # managed separately in gatecontrol-client-core repo.

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "ci"
